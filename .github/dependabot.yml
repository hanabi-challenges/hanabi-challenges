version: 2
updates:
  - package-ecosystem: "gitsubmodules"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"

  - package-ecosystem: "npm"
    directory: "/apps/web"
    schedule:
      interval: "daily"
    allow:
      - dependency-name: "@hanabi-challenges/design-system"
    commit-message:
      prefix: "chore"

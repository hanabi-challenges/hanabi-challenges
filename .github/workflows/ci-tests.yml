name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['main']
  workflow_dispatch:

jobs:
  ci-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm run test:e2e:install

      - name: Prepare integration test database
        run: ./infra/ci/test_db_reset.sh

      - name: Set environment variables for full test battery
        run: |
          echo "JWT_SECRET=test_jwt_secret_for_ci" >> $GITHUB_ENV
          echo "DATABASE_URL=postgresql://hanabi_user:hanabi_password@localhost:55432/hanabi_test" >> $GITHUB_ENV
          echo "NODE_ENV=test" >> $GITHUB_ENV

      - name: Run CI test battery
        run: pnpm run ci:tests

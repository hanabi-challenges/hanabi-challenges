name: Tracker CI

on:
  pull_request:
    branches: ['tracker-main']
  workflow_dispatch:

jobs:
  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build tracker/types (required before typechecking server and client)
        run: pnpm --filter @tracker/types run build

      - name: Typecheck all tracker packages
        run: pnpm tracker:typecheck

  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm tracker:format:check

      - name: Lint
        run: pnpm tracker:lint

  build:
    name: build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all tracker packages
        run: pnpm tracker:build

  unit-tests:
    name: unit-tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build tracker/types (required for server/client unit tests)
        run: pnpm --filter @tracker/types run build

      - name: Run tracker unit tests
        run: pnpm tracker:test:unit
        env:
          TRACKER_DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder

  integration-tests:
    name: integration-tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: hanabi_test
          POSTGRES_USER: hanabi_user
          POSTGRES_PASSWORD: hanabi_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build tracker/types
        run: pnpm --filter @tracker/types run build

      - name: Run tracker integration tests
        run: pnpm tracker:test:integration
        env:
          TRACKER_DATABASE_URL: postgresql://hanabi_user:hanabi_password@localhost:5432/hanabi_test
          TRACKER_TEST_DATABASE_URL: postgresql://hanabi_user:hanabi_password@localhost:5432/hanabi_test

  e2e-tests:
    name: e2e-tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: hanabi_test
          POSTGRES_USER: hanabi_user
          POSTGRES_PASSWORD: hanabi_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build tracker packages (types + server + client)
        run: pnpm tracker:build

      - name: Run tracker database migrations
        run: pnpm tracker:db:migrate
        env:
          TRACKER_DATABASE_URL: postgresql://hanabi_user:hanabi_password@localhost:5432/hanabi_test

      - name: Install Playwright browser
        run: pnpm tracker:test:e2e:install

      - name: Run tracker E2E tests
        run: pnpm tracker:test:e2e
        env:
          TRACKER_DATABASE_URL: postgresql://hanabi_user:hanabi_password@localhost:5432/hanabi_test
          NODE_ENV: test

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: tracker-e2e-artifacts
          path: |
            test-results/
          retention-days: 7

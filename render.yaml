services:
  - type: web
    name: hanabi-challenges
    runtime: static
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
    buildCommand: npx -y pnpm@10.30.3 install --frozen-lockfile && npx -y pnpm@10.30.3 -C apps/web run build
    staticPublishPath: ./apps/web/dist
    domains:
      - hanabi-challenges.com
      - www.hanabi-challenges.com
    routes:
      - type: rewrite
        source: /api/*
        destination: https://api.hanabi-challenges.com/api/*
      - type: rewrite
        source: /ws/*
        destination: wss://api.hanabi-challenges.com/ws/*
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: hanabi-challenges-api-prod
    runtime: node
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: hanabi-challenges-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
    buildCommand: npx -y pnpm@10.30.3 install --frozen-lockfile && npx -y pnpm@10.30.3 -C apps/api run build
    startCommand: node apps/api/dist/src/scripts/bootstrap-db.js && node apps/api/dist/src/index.js
    healthCheckPath: /health
    domains:
      - api.hanabi-challenges.com

databases:
  - name: hanabi-challenges-db
    plan: basic-256mb
    databaseName: hanabi
    user: hanabi

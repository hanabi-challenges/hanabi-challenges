services:
  # ---------------------------------------------------------------------------
  # Production — web (static)
  #
  # Serves both the main site and the tracker client (merged into /tracker/).
  # Rewrites /api/* and /ws/* to the production API.
  # Rewrites /tracker/api/* to the tracker API service.
  # Rewrites /tracker/* to the tracker client SPA's index.html.
  # No preview environments — prod is only deployed from main.
  # ---------------------------------------------------------------------------
  - type: web
    name: hanabi-challenges
    runtime: static
    previews:
      generation: disabled
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
    buildCommand: bash scripts/build-with-tracker.sh
    staticPublishPath: ./apps/web/dist
    domains:
      - hanabi-challenges.com
      - www.hanabi-challenges.com
    routes:
      - type: rewrite
        source: /api/*
        destination: https://api.hanabi-challenges.com/api/*
      - type: rewrite
        source: /ws/*
        destination: wss://api.hanabi-challenges.com/ws/*
      - type: rewrite
        source: /tracker/api/*
        destination: https://api.hanabi-challenges.com/tracker/api/*
      - type: rewrite
        source: /tracker/health*
        destination: https://api.hanabi-challenges.com/tracker/health*
      - type: rewrite
        source: /tracker/*
        destination: /tracker/index.html
      - type: rewrite
        source: /*
        destination: /index.html

  # ---------------------------------------------------------------------------
  # Production — API (includes tracker server as co-located subprocess)
  #
  # No preview environments — prod is only deployed from main.
  # ---------------------------------------------------------------------------
  - type: web
    name: hanabi-challenges-api-prod
    runtime: node
    region: virginia
    branch: main
    previews:
      generation: disabled
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: hanabi-challenges-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      # SIMULATION_MODE intentionally absent — defaults to false
      # Tracker server (runs on port 4001 internally, proxied from /tracker/**)
      - key: TRACKER_DATABASE_URL
        fromDatabase:
          name: hanabi-challenges-db
          property: connectionString
      - key: TRACKER_PORT
        value: "4001"
      - key: TRACKER_LOG_LEVEL
        value: info
      - key: TRACKER_BASE_URL
        value: https://hanabi-challenges.com
      # GitHub App integration
      - key: GITHUB_APP_ID
        value: "3209877"
      - key: GITHUB_APP_INSTALLATION_ID
        value: "119668621"
      - key: GITHUB_REPO_OWNER
        value: hanabi-challenges
      - key: GITHUB_REPO_NAME
        value: hanabi-challenges
      # Sensitive — set manually in Render dashboard
      - key: GITHUB_APP_PRIVATE_KEY
        sync: false
      - key: GITHUB_WEBHOOK_SECRET
        sync: false
      # Discord integrations — set manually in Render dashboard before go-live
      # - key: DISCORD_MOD_WEBHOOK_URL
      #   sync: false
      # - key: DISCORD_BOT_TOKEN
      #   sync: false
      # - key: DISCORD_GUILD_ID
      #   value: ...
      # - key: DISCORD_MOD_ROLE_NAME
      #   value: ...
    buildCommand: COREPACK_INTEGRITY_KEYS=0 corepack enable && COREPACK_INTEGRITY_KEYS=0 corepack prepare pnpm@10.31.0 --activate && pnpm install --frozen-lockfile --filter @hanabi-challenges/api... --filter @tracker/server... && pnpm -C apps/api run build && pnpm -C tracker/types run build && pnpm -C tracker/server run build
    startCommand: node apps/api/dist/src/scripts/bootstrap-db.js && pnpm tracker:db:migrate && node apps/api/dist/src/index.js
    healthCheckPath: /health
    domains:
      - api.hanabi-challenges.com

  # ---------------------------------------------------------------------------
  # Test — web (static, permanent)
  #
  # No custom domain — uses Render's auto-assigned URL.
  # Always points to the permanent test API, not PR previews.
  # The frontend uses relative /api paths; this rewrite handles the proxying.
  # No preview environments — the web service is intentionally shared across
  # all PRs. PR-specific testing is done against the preview API URL directly.
  # ---------------------------------------------------------------------------
  - type: web
    name: hanabi-challenges-test
    runtime: static
    previews:
      generation: disabled
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
    buildCommand: bash scripts/build-with-tracker.sh
    staticPublishPath: ./apps/web/dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://hanabi-challenges-api-test.onrender.com/api/*
      - type: rewrite
        source: /ws/*
        destination: wss://hanabi-challenges-api-test.onrender.com/ws/*
      - type: rewrite
        source: /tracker/api/*
        destination: https://hanabi-challenges-api-test.onrender.com/tracker/api/*
      - type: rewrite
        source: /tracker/health*
        destination: https://hanabi-challenges-api-test.onrender.com/tracker/health*
      - type: rewrite
        source: /tracker/*
        destination: /tracker/index.html
      - type: rewrite
        source: /*
        destination: /index.html

  # ---------------------------------------------------------------------------
  # Test — API (permanent + PR previews, includes tracker as co-located subprocess)
  #
  # SIMULATION_MODE=true mounts mock hanab-live routes on this server.
  # The hanab-live client auto-routes to http://localhost:$PORT (same process).
  #
  # Preview environments: each open PR automatically gets an isolated instance
  # at https://hanabi-challenges-api-test-pr-{N}.onrender.com, backed by its
  # own database copy. The instance is torn down when the PR is closed/merged.
  # Migrations run automatically via bootstrap-db.js on startup.
  # ---------------------------------------------------------------------------
  - type: web
    name: hanabi-challenges-api-test
    runtime: node
    region: virginia
    branch: main
    previews:
      generation: automatic
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: NODE_ENV
        value: test
      - key: DATABASE_URL
        fromDatabase:
          name: hanabi-challenges-db-test
          property: connectionString
      - key: JWT_SECRET
        # generateValue: each service instance (including previews) gets its
        # own stable secret without requiring manual configuration.
        generateValue: true
      - key: SIMULATION_MODE
        value: true
      # Tracker server (runs on port 4001 internally, proxied from /tracker/**)
      - key: TRACKER_DATABASE_URL
        fromDatabase:
          name: hanabi-challenges-db-test
          property: connectionString
      - key: TRACKER_PORT
        value: "4001"
      - key: TRACKER_LOG_LEVEL
        value: info
      - key: TRACKER_BASE_URL
        value: https://hanabi-challenges-test.onrender.com
    buildCommand: COREPACK_INTEGRITY_KEYS=0 corepack enable && COREPACK_INTEGRITY_KEYS=0 corepack prepare pnpm@10.31.0 --activate && pnpm install --frozen-lockfile --filter @hanabi-challenges/api... --filter @tracker/server... && pnpm -C apps/api run build && pnpm -C tracker/types run build && pnpm -C tracker/server run build
    startCommand: node apps/api/dist/src/scripts/bootstrap-db.js && pnpm tracker:db:migrate && node apps/api/dist/src/index.js
    healthCheckPath: /health

databases:
  # Production database
  - name: hanabi-challenges-db
    plan: basic-256mb
    region: virginia
    databaseName: hanabi
    user: hanabi
    previews:
      generation: disabled

  # Test database — isolated from production; simulation data lives here.
  # Preview environments: each PR gets its own fresh database instance,
  # automatically wired to the corresponding preview API service via
  # fromDatabase in the service definition above.
  - name: hanabi-challenges-db-test
    plan: free
    region: virginia
    databaseName: hanabi_test
    user: hanabi_test
    previews:
      generation: automatic

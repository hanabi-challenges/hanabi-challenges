services:
  # ---------------------------------------------------------------------------
  # Production — web (static)
  #
  # Serves both the main site and the tracker client (merged into /tracker/).
  # Rewrites /api/* and /ws/* to the production API.
  # Rewrites /tracker/api/* to the tracker API service.
  # Rewrites /tracker/* to the tracker client SPA's index.html.
  # No preview environments — prod is only deployed from main.
  # ---------------------------------------------------------------------------
  - type: web
    name: hanabi-challenges
    runtime: static
    previews:
      generation: disabled
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
    buildCommand: bash scripts/build-with-tracker.sh
    staticPublishPath: ./apps/web/dist
    domains:
      - hanabi-challenges.com
      - www.hanabi-challenges.com
    routes:
      - type: rewrite
        source: /api/*
        destination: https://api.hanabi-challenges.com/api/*
      - type: rewrite
        source: /ws/*
        destination: wss://api.hanabi-challenges.com/ws/*
      - type: rewrite
        source: /tracker/api/*
        destination: https://tracker-api.hanabi-challenges.com/tracker/api/*
      - type: rewrite
        source: /tracker/health*
        destination: https://tracker-api.hanabi-challenges.com/tracker/health*
      - type: rewrite
        source: /tracker/*
        destination: /tracker/index.html
      - type: rewrite
        source: /*
        destination: /index.html

  # ---------------------------------------------------------------------------
  # Production — API
  #
  # No preview environments — prod is only deployed from main.
  # ---------------------------------------------------------------------------
  - type: web
    name: hanabi-challenges-api-prod
    runtime: node
    region: virginia
    branch: main
    previews:
      generation: disabled
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: hanabi-challenges-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      # SIMULATION_MODE intentionally absent — defaults to false
    buildCommand: COREPACK_INTEGRITY_KEYS=0 corepack enable && COREPACK_INTEGRITY_KEYS=0 corepack prepare pnpm@10.31.0 --activate && pnpm install --frozen-lockfile --filter @hanabi-challenges/api... && pnpm -C apps/api run build
    startCommand: node apps/api/dist/src/scripts/bootstrap-db.js && node apps/api/dist/src/index.js
    healthCheckPath: /health
    domains:
      - api.hanabi-challenges.com

  # ---------------------------------------------------------------------------
  # Production — Tracker API
  #
  # Runs the tracker Express server (port 4001) with Discord bot.
  # Migrations run automatically before the server starts.
  # No preview environments — prod is only deployed from main.
  # ---------------------------------------------------------------------------
  - type: web
    name: hanabi-challenges-tracker-api-prod
    runtime: node
    region: virginia
    branch: main
    previews:
      generation: disabled
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: NODE_ENV
        value: production
      - key: TRACKER_DATABASE_URL
        fromDatabase:
          name: hanabi-challenges-db
          property: connectionString
      - key: TRACKER_PORT
        value: 10000  # Render assigns PORT=10000 for web services
      - key: TRACKER_LOG_LEVEL
        value: info
      - key: TRACKER_BASE_URL
        value: https://hanabi-challenges.com
      # GitHub integration — set manually in Render dashboard before go-live
      # GITHUB_BOT_TOKEN: set in dashboard (sync: false)
      # GITHUB_WEBHOOK_SECRET: set in dashboard (sync: false)
      # GITHUB_REPO_OWNER: set in dashboard
      # GITHUB_REPO_NAME: set in dashboard
      # Discord integrations — set manually in Render dashboard before go-live
      # DISCORD_MOD_WEBHOOK_URL: set in dashboard (sync: false)
      # DISCORD_BOT_TOKEN: set in dashboard (sync: false)
      # DISCORD_GUILD_ID: set in dashboard
      # DISCORD_MOD_ROLE_NAME: set in dashboard
    buildCommand: COREPACK_INTEGRITY_KEYS=0 corepack enable && COREPACK_INTEGRITY_KEYS=0 corepack prepare pnpm@10.31.0 --activate && pnpm install --frozen-lockfile --filter @tracker/server... --filter @tracker/types && pnpm tracker:build
    startCommand: pnpm tracker:db:migrate && node tracker/server/dist/src/index.js
    healthCheckPath: /tracker/health
    domains:
      - tracker-api.hanabi-challenges.com

  # ---------------------------------------------------------------------------
  # Test — web (static, permanent)
  #
  # No custom domain — uses Render's auto-assigned URL.
  # Always points to the permanent test API, not PR previews.
  # The frontend uses relative /api paths; this rewrite handles the proxying.
  # No preview environments — the web service is intentionally shared across
  # all PRs. PR-specific testing is done against the preview API URL directly.
  # ---------------------------------------------------------------------------
  - type: web
    name: hanabi-challenges-test
    runtime: static
    previews:
      generation: disabled
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
    buildCommand: bash scripts/build-with-tracker.sh
    staticPublishPath: ./apps/web/dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://hanabi-challenges-api-test.onrender.com/api/*
      - type: rewrite
        source: /ws/*
        destination: wss://hanabi-challenges-api-test.onrender.com/ws/*
      - type: rewrite
        source: /tracker/api/*
        destination: https://hanabi-challenges-tracker-api-test.onrender.com/tracker/api/*
      - type: rewrite
        source: /tracker/health*
        destination: https://hanabi-challenges-tracker-api-test.onrender.com/tracker/health*
      - type: rewrite
        source: /tracker/*
        destination: /tracker/index.html
      - type: rewrite
        source: /*
        destination: /index.html

  # ---------------------------------------------------------------------------
  # Test — Tracker API (permanent + PR previews)
  #
  # Runs the tracker server with migrations on startup.
  # Preview environments: each open PR gets an isolated tracker API instance.
  # ---------------------------------------------------------------------------
  - type: web
    name: hanabi-challenges-tracker-api-test
    runtime: node
    region: virginia
    branch: main
    previews:
      generation: automatic
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: NODE_ENV
        value: test
      - key: TRACKER_DATABASE_URL
        fromDatabase:
          name: hanabi-challenges-db-test
          property: connectionString
      - key: TRACKER_PORT
        value: 10000
      - key: TRACKER_LOG_LEVEL
        value: info
      - key: TRACKER_BASE_URL
        value: https://hanabi-challenges-test.onrender.com
    buildCommand: COREPACK_INTEGRITY_KEYS=0 corepack enable && COREPACK_INTEGRITY_KEYS=0 corepack prepare pnpm@10.31.0 --activate && pnpm install --frozen-lockfile --filter @tracker/server... --filter @tracker/types && pnpm tracker:build
    startCommand: pnpm tracker:db:migrate && node tracker/server/dist/src/index.js
    healthCheckPath: /tracker/health

  # ---------------------------------------------------------------------------
  # Test — API (permanent + PR previews)
  #
  # SIMULATION_MODE=true mounts mock hanab-live routes on this server.
  # The hanab-live client auto-routes to http://localhost:$PORT (same process).
  #
  # Preview environments: each open PR automatically gets an isolated instance
  # at https://hanabi-challenges-api-test-pr-{N}.onrender.com, backed by its
  # own database copy. The instance is torn down when the PR is closed/merged.
  # Migrations run automatically via bootstrap-db.js on startup.
  # ---------------------------------------------------------------------------
  - type: web
    name: hanabi-challenges-api-test
    runtime: node
    region: virginia
    branch: main
    previews:
      generation: automatic
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: NODE_ENV
        value: test
      - key: DATABASE_URL
        fromDatabase:
          name: hanabi-challenges-db-test
          property: connectionString
      - key: JWT_SECRET
        # generateValue: each service instance (including previews) gets its
        # own stable secret without requiring manual configuration.
        generateValue: true
      - key: SIMULATION_MODE
        value: true
    buildCommand: COREPACK_INTEGRITY_KEYS=0 corepack enable && COREPACK_INTEGRITY_KEYS=0 corepack prepare pnpm@10.31.0 --activate && pnpm install --frozen-lockfile --filter @hanabi-challenges/api... && pnpm -C apps/api run build
    startCommand: node apps/api/dist/src/scripts/bootstrap-db.js && node apps/api/dist/src/index.js
    healthCheckPath: /health

databases:
  # Production database
  - name: hanabi-challenges-db
    plan: basic-256mb
    region: virginia
    databaseName: hanabi
    user: hanabi
    previews:
      generation: disabled

  # Test database — isolated from production; simulation data lives here.
  # Preview environments: each PR gets its own fresh database instance,
  # automatically wired to the corresponding preview API service via
  # fromDatabase in the service definition above.
  - name: hanabi-challenges-db-test
    plan: free
    region: virginia
    databaseName: hanabi_test
    user: hanabi_test
    previews:
      generation: automatic
